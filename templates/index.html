<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FlashLog</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>

</head>
<body>
<!-- Top Navigation Bar -->
<nav class="navbar navbar-custom fixed-top px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <span class="material-symbols-outlined text-info" style="font-size: 28px;">local_shipping</span>
            <span class="fw-black text-info text-uppercase"
                  style="letter-spacing: 0.15em; font-size: 20px; font-family: 'Manrope', sans-serif;">FlashLog</span>
        </div>
        <div>
            <li><a href="{{ url_for('login') }}">Login</a></li>
        </div>
    </div>
</nav>

<!-- Carroça -->
<div class="carrossel d-flex overflow-hidden">
    <div id="carouselExampleInterval" class="carousel slide carrossel" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item bg-dark active" data-bs-interval="2000">
                <img src="/static/img/caminhao.jpg" class="w-100 opacity-50 object-fit-cover" alt="...">
            </div>
            <div class="carousel-item bg-dark" data-bs-interval="2000">
                <img src="/static/img/planeta_redimensionado.jpg" class="opacity-50 object-fit-cover" alt="...">
            </div>
            <div class="carousel-item bg-dark" data-bs-interval="2000">
                <img src="/static/img/pacote.jpg" class="object-fit-cover w-100 opacity-50" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval"
                data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval"
                data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <div class="w-100 h-100 position-absolute d-flex flex-column justify-content-evenly">
        <!-- caso queira escrever algo na imagem, escreva aqui(div) -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
