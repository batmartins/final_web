<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FlashLog</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>

</head>
<body>


<div class="pai_formulario_login">
    <div class="formulario_login">
        <H1 class="login_titulo"> Login </H1>
        <form action="{{url_for('login')}}" method="post">
            <div class="filho_formulario_login">
                <label>
                    email:
                    <input type="text" name="form-email">
                </label>
            </div>
            <div class="filho_formulario_login">
                <label>
                    senha:
                    <input type="password" name="form-senha">
                </label>
            </div>
            <div class="botao_entrar_login">
                <button class="botao_entrar_login_btn btn-primary-custom" type="submit">Entrar</button>
            </div>

        </form>
        <div>
            Não tem conta? <a data-bs-toggle="modal" data-bs-target="#staticBackdrop" href="">Cadastre-se</a>
        </div>
        <!-- Modal -->
        <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
             aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="staticBackdropLabel">Cadastro</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="form-cadastro" action="{{url_for('cadastro_usuario')}}" method="post">
                            <label>
                                Nome:
                                <input id="input-nome" placeholder="Digite o nome" name="form-nome"
                                       class="form-control">
                            </label>
                            <label>
                                E-mail:
                                <input id="input-email" placeholder="Digite o e-mail" name="form-email"
                                       class="form-control">
                            </label>
                            <label>
                                Senha:
                                <input id="input-senha1" placeholder="Digite a senha" name="form-senha"
                                       class="form-control">
                            </label>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                                <button type="submit" class="btn btn-primary">Cadastrar</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>


<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
