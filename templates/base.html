<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FlashLog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>

<body>

<!-- Top Navbar -->
<nav class="navbar navbar-custom fixed-top px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-2">
            <span class="material-symbols-outlined text-info" style="font-size:28px;">local_shipping</span>
            <span class="fw-black text-info text-uppercase"
                  style="letter-spacing:0.15em;font-size:20px;font-family:'Manrope',sans-serif;">
                FlashLog
            </span>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="navbar-desktop-links d-flex gap-1">
                <a class="nav-link-custom active" href="{{ url_for('rastreio') }}">Operations</a>
            </div>
            <button class="btn p-2 rounded-circle border-0 text-info">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="d-flex align-items-center gap-2"
                 style="background:#054D50;border:1px solid #1A6B6E;border-radius:6px;padding:6px 12px;">
                <span class="material-symbols-outlined text-info" style="font-size:18px;">person</span>
                <span style="font-size:13px;font-weight:600;color:#dde4e4;">
                    {{ current_user.nome }}
                </span>
            </div>
        </div>

    </div>
</nav>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="px-3 py-3 d-flex flex-column h-100">

        <!-- Perfil -->


        <!-- Menu -->
        <nav class="nav flex-column gap-1 flex-grow-1">







            <a class="sidebar-link {% if request.endpoint == 'rastreio' %}active{% endif %}"
               href="{{ url_for('rastreio') }}">
                <span class="material-symbols-outlined">search</span>
                <span>Rastreio</span>
            </a>


            <a class="sidebar-link {% if request.endpoint == 'galpao' %}active{% endif %}"
               href="{{ url_for('galpao') }}">
                <span class="material-symbols-outlined">warehouse</span>
                <span>Galpões</span>
            </a>

            <a class="sidebar-link {% if request.endpoint == 'cliente' %}active{% endif %}"
               href="{{ url_for('cliente') }}">
                <span class="material-symbols-outlined">groups</span>
                <span>Clientes</span>
            </a>
            <a class="sidebar-link {% if request.endpoint == 'cliente' %}active{% endif %}"
               href="{{ url_for('encomendas') }}">
                <span class="material-symbols-outlined">box</span>
                <span>encomendas</span>
            </a>

        </nav>

        <!-- Status + Sair -->
        <div class="mt-auto border-top pt-3" style="border-color:#1A6B6E !important;">



            <a href="{{ url_for('logout') }}"
               class="sidebar-link text-danger"
               style="border-left-color:transparent;">
                <span class="material-symbols-outlined">logout</span>
                <span>Sair</span>
            </a>

        </div>

    </div>
</aside>

<!-- Main Content -->
<main class="main_base main-content">
    <div class="container-fluid p-3" style="max-width:1600px;">
        {% block conteudo %}
        {% endblock conteudo %}
    </div>
</main>

<!-- Bottom Nav (Mobile) -->
<nav class="bottom-nav">

    </a>
    <a href="{{ url_for('rastreio') }}" class="d-flex flex-column align-items-center text-muted" style="font-size:11px;text-decoration:none;">
        <span class="material-symbols-outlined" style="font-size:22px;">search</span>
        Rastreio
    </a>
    <a href="{{ url_for('galpao') }}" class="d-flex flex-column align-items-center text-muted" style="font-size:11px;text-decoration:none;">
        <span class="material-symbols-outlined" style="font-size:22px;">warehouse</span>
        Galpões
    </a>
    <a href="{{ url_for('cliente') }}" class="d-flex flex-column align-items-center text-muted" style="font-size:11px;text-decoration:none;">
        <span class="material-symbols-outlined" style="font-size:22px;">groups</span>
        Clientes
    </a>
    <a href="{{ url_for('cadastrar_movimentacao') }}" class="d-flex flex-column align-items-center text-muted" style="font-size:11px;text-decoration:none;">
        <span class="material-symbols-outlined" style="font-size:22px;">groups</span>
        Movimentação
    </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
