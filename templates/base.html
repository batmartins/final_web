<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FlashLog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap 5 CSS -->
     <link rel="stylesheet" href="/static/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>

</head>
<body>
<!-- Top Navigation Bar -->
<nav class="navbar navbar-custom fixed-top px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <span class="material-symbols-outlined text-info" style="font-size: 28px;">local_shipping</span>
            <span class="fw-black text-info text-uppercase"
                  style="letter-spacing: 0.15em; font-size: 20px; font-family: 'Manrope', sans-serif;">FlashLog</span>
        </div>
        <div class="d-flex align-items-center gap-4">
            <div class="navbar-desktop-links d-flex gap-2">
                <a class="nav-link-custom active" href="#">Operations</a>

            </div>
            <button class="btn p-2 rounded-circle border-0 text-info">
                <span class="material-symbols-outlined">notifications</span>
            </button>
        </div>
    </div>
</nav>



<!-- Sidebar Navigation -->
<aside class="sidebar">
    <div class="px-4 py-3">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="rounded-circle d-flex align-items-center justify-content-center"
                 style="width: 40px; height: 40px; background: #194e51; border: 1px solid var(--border-color);">
                <span class="material-symbols-outlined text-info">person</span>
            </div>
            <div>
                <div class="text-info fw-bold" style="font-size: 14px;">{{current_user.nome}}</div>
                <div class="text-muted text-uppercase" style="font-size: 10px; letter-spacing: -0.02em;">
                    {{current_user.email}}
                </div>
                <a href="{{url_for('logout')}}">SAIR</a>
            </div>
        </div>
        <nav class="nav flex-column gap-1">
            <a class="sidebar-link active" href="{{url_for('rastreio')}}">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
            <a class="sidebar-link active" href="{{url_for('busca_pacote')}}">
                <span class="material-symbols-outlined">search</span>
                <span>Rastreio</span>
            </a>

            <a class="sidebar-link active" href="{{url_for('galpao')}}">
                <span class="material-symbols-outlined">search</span>
                <span>Rastreio</span>
            </a>

        </nav>
    </div>
    <div class="mt-auto p-4 border-top border-secondary border-opacity-25">
        <div class="p-3 rounded-2"
             style="background-color: rgba(5, 77, 80, 0.5); border: 1px solid var(--border-color);">
            <div class="text-muted text-uppercase mb-2" style="font-size: 10px;">System Status</div>
            <div class="d-flex align-items-center gap-2">
                <div class="rounded-circle bg-info" style="width: 8px; height: 8px;"></div>
                <span class="text-info fw-bold" style="font-size: 12px;">Operational</span>
            </div>
        </div>
    </div>
</aside>
<!-- Main content -->
<main class="main_base main-content ">
    <div class="container-fluid p-1 p-md-3" style="max-width: 1600px;">
        {% block conteudo %}


        {% endblock conteudo %}
    </div>
</main>
<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
