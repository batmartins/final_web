{% extends 'base.html' %}

{% block conteudo %}

<div class="container-fluid">

    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h2 class="fw-bold underline_azul mb-1">Gestão de Clientes</h2>
            <small class="text-muted">Base de parceiros e clientes logísticos</small>
        </div>
        <button class="btn-primary-custom"
                data-bs-toggle="modal"
                data-bs-target="#modalNovoCliente">
            <span class="material-symbols-outlined align-middle me-1">add</span>
            Novo Cliente
        </button>
    </div>

    <!-- Cards -->
    <div class="row g-4 mb-4">



    </div>

    <!-- Tabela -->
    <div class="table-container">

        <div class="d-flex justify-content-between align-items-center p-4 border-bottom"
             style="border-color:var(--border-color)!important;">
            <div>
                <h5 class="fw-bold underline_azul mb-0">Base de Clientes</h5>
                <small class="text-muted">Gerencie seus parceiros logísticos</small>
            </div>
            <div class="d-flex gap-2">
                <input class="form-control"
                       placeholder="Buscar cliente..."
                       style="width:250px;background:#033C3E;border:1px solid #1A6B6E;color:#dde4e4;">
                <button class="btn-primary-custom">Buscar</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table mb-0 align-middle">
                <thead>
                    <tr>
                        <th>CLIENTE</th>
                        <th>E-mail</th>
                        <th>Senha</th>
                        <th>Endereço</th>

                    </tr>
                </thead>
                <tbody>


                </tbody>
            </table>
        </div>

    </div>

</div>

<!-- Modal Novo Cliente -->
<div class="modal fade" id="modalNovoCliente" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content"
             style="background:#054D50;border:1px solid #1A6B6E;color:#dde4e4;">

            <div class="modal-header border-bottom" style="border-color:#1A6B6E !important;">
                <h5 class="modal-title fw-bold">Cadastrar Novo Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form method="POST" action="/clientes/cadastrar">
                <div class="modal-body">
                    <div class="row g-3">



                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nome</label>
                            <input type="text" name="nome_fantasia" class="form-control"
                                   style="background:#033C3E;border:1px solid #1A6B6E;color:#dde4e4;">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">E-mail</label>
                            <input type="email" name="email" class="form-control" required
                                   style="background:#033C3E;border:1px solid #1A6B6E;color:#dde4e4;">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Senha</label>
                            <input type="text" name="telefone" class="form-control"
                                   style="background:#033C3E;border:1px solid #1A6B6E;color:#dde4e4;">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Endereço</label>
                            <input type="text" name="cidade" class="form-control"
                                   style="background:#033C3E;border:1px solid #1A6B6E;color:#dde4e4;">
                        </div>

                    </div>
                </div>

                <div class="modal-footer" style="border-color:#1A6B6E;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn-primary-custom">Salvar Cliente</button>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
